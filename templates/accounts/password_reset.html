{% load static %}
<!doctype html>
<html lang="fr" data-bs-theme="light">
   <head>
      <!-- Required meta tags -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
 <!-- Favicon icon-->
<link rel="apple-touch-icon" sizes="180x180" href="{% static 'assets/images/favicon/apple-touch-icon.png' %}" />
<link rel="icon" type="image/png" sizes="32x32" href="{% static 'assets/images/favicon/favicon-32x32.png' %}" />
<link rel="icon" type="image/png" sizes="16x16" href="{% static 'assets/images/favicon/favicon-16x16.png' %}" />
<link rel="manifest" href="{% static 'assets/images/favicon/site.webmanifest' %}" />
<link rel="mask-icon" href="{% static 'assets/images/favicon/block-safari-pinned-tab.svg' %}" color="#8b3dff" />
<link rel="shortcut icon" href="{% static 'assets/images/favicon/favicon.ico' %}" />
<meta name="msapplication-TileColor" content="#8b3dff" />
<meta name="msapplication-config" content="{% static 'assets/images/favicon/tile.xml' %}" />

<!-- Color modes -->
<script src="{% static 'assets/js/vendors/color-modes.js' %}"></script>

<!-- Libs CSS -->
<link href="{% static 'assets/libs/simplebar/dist/simplebar.min.css' %}" rel="stylesheet" />
<link href="{% static 'assets/libs/bootstrap-icons/font/bootstrap-icons.min.css' %}" rel="stylesheet" />

<!-- Scroll Cue -->
<link rel="stylesheet" href="{% static 'assets/libs/scrollcue/scrollCue.css' %}" />

<!-- Box icons -->
<link rel="stylesheet" href="{% static 'assets/fonts/css/boxicons.min.css' %}" />

<!-- Theme CSS -->
<link rel="stylesheet" href="{% static 'assets/css/theme.min.css' %}">

      <title>Réinitialiser le mot de passe - Atreyiu Hub V2</title>
   </head>

   <body>
      <main>
         <div class="pattern-square"></div>
         <!--Pageheader start-->
         <section class="py-5 py-lg-8">
            <div class="container">
               <div class="row">
                  <div class="col-xl-4 offset-xl-4 col-md-12 col-12">
                     <div class="text-center">
                        <a href="{% url 'homepage:index' %}"><img loading="lazy" src="{% static 'assets/images/logo/brand-icon.svg' %}" alt="brand" class="mb-3" /></a>
                        <h1 class="mb-1">Mot de passe oublié ?</h1>
                        <p class="mb-0">Entrez votre e-mail pour réinitialiser votre mot de passe.</p>
                     </div>
                  </div>
               </div>
            </div>
         </section>
         <!--Pageheader end-->
         
         <section>
            <div class="container">
               <div class="row justify-content-center">
                  <div class="col-xl-5 col-lg-6 col-md-8 col-12">
                     <div class="card shadow-sm mb-6">
                        <div class="card-body">
                            {% if messages %}
                               <div class="mb-3">
                                  {% for message in messages %}
                                     <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                     </div>
                                  {% endfor %}
                               </div>
                            {% endif %}
                            
                            <form method="post">
                              {% csrf_token %}
                              
                              <div class="mb-3">
                                 <label for="id_email" class="form-label">E-mail</label>
                                 <input type="email" name="email" class="form-control" id="id_email" required placeholder="votre@email.com" />
                              </div>

                              <div class="d-grid">
                                 <button class="btn btn-primary" type="submit">Envoyer le lien</button>
                              </div>
                           </form>
                           
                           <div class="mt-4 text-center">
                              <a href="{% url 'login' %}" class="text-primary small">Retour à la connexion</a>
                           </div>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </section>
      </main>

      <!-- Libs JS -->
<script src="{% static 'assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'assets/libs/simplebar/dist/simplebar.min.js' %}"></script>
<script src="{% static 'assets/libs/headhesive/dist/headhesive.min.js' %}"></script>

<!-- Theme JS -->
<script src="{% static 'assets/js/theme.min.js' %}"></script>
   </body>
</html>
