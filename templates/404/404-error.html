{% extends 'base/base.html' %}
{% load static %}

{% block title %}404 - Page non trouvée | Atreyiu Hub{% endblock %}

{% block content %}

<div class="pattern-square"></div>

<main>
    <!--404 error start-->
    <div class="container d-flex flex-column overflow-hidden">
        <div class="row align-items-center justify-content-center min-vh-100 text-center">
            <div class="col-lg-6 col-12">
                <div class="position-relative mb-7">
                    <div class="scene d-none d-lg-block" data-relative-input="true">
                        <div class="position-absolute top-0" data-depth="0.5">
                            <img src="{% static 'assets/images/error/stars.svg' %}" alt />
                        </div>
                    </div>
                    <div class="scene d-none d-lg-block" data-relative-input="true">
                        <div class="position-absolute" data-depth="0.1">
                            <img src="{% static 'assets/images/error/rocket.svg' %}" alt />
                        </div>
                    </div>
                    <div class="scene d-none d-lg-block" data-relative-input="true">
                        <div class="position-absolute top-0 start-50 translate-middle"
                            style="margin-top: -80px; margin-left: -80px" data-depth="0.1">
                            <img src="{% static 'assets/images/error/globe.svg' %}" alt />
                        </div>
                    </div>
                    <div class="scene d-none d-lg-block" data-relative-input="true">
                        <div class="position-absolute start-50" data-depth="0.1">
                            <img src="{% static 'assets/images/error/astronut.svg' %}" alt
                                style="top: -110px; position: absolute; bottom: 0" />
                        </div>
                    </div>
                    <div class="position-relative z-n1">
                        <img src="{% static 'assets/images/error/404-number.svg' %}" alt class="img-fluid" />
                    </div>
                    <div class="scene d-none d-lg-block" data-relative-input="true">
                        <div class="position-absolute start-100 bottom-0" style data-depth="0.1">
                            <img src="{% static 'assets/images/error/planet.svg' %}" alt />
                        </div>
                    </div>
                </div>

                <h2>Oups, page non trouvée</h2>
                <p>La page que vous recherchez n'est pas disponible.</p>

                <a href="{% url 'homepage:index' %}" class="btn btn-primary">Retour à l'accueil</a>
            </div>
        </div>
    </div>
    <!--404 error end-->
</main>

{% endblock %}
