<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau message de contact</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .header {
            background-color: #8b3dff;
            padding: 24px;
            text-align: center;
        }
        .content {
            padding: 40px;
            color: #1e293b;
            line-height: 1.6;
        }
        .content h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #0f172a;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 12px;
        }
        .info-box {
            background-color: #f8fafc;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }
        .info-item {
            margin-bottom: 12px;
        }
        .info-label {
            font-weight: 600;
            color: #64748b;
            font-size: 14px;
            text-transform: uppercase;
            display: block;
        }
        .info-value {
            color: #1e293b;
            font-size: 16px;
        }
        .message-content {
            background-color: #ffffff;
            border-left: 4px solid #8b3dff;
            padding: 16px;
            margin-top: 24px;
            font-style: italic;
            color: #334155;
            white-space: pre-wrap;
        }
        .footer {
            background-color: #f1f5f9;
            padding: 24px;
            text-align: center;
            font-size: 14px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="color: #ffffff; margin: 0; font-size: 20px;">Atreyiu Hub - Contact</h2>
        </div>
        <div class="content">
            <h1>Nouveau message de contact</h1>
            
            <div class="info-box">
                <div class="info-item">
                    <span class="info-label">Expéditeur</span>
                    <span class="info-value">{{ sender_name }}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">E-mail</span>
                    <span class="info-value">{{ sender_email }}</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Sujet</span>
                    <span class="info-value">{{ subject_text }}</span>
                </div>
            </div>

            <div class="info-label">Message :</div>
            <div class="message-content">{{ message_content }}</div>
        </div>
        <div class="footer">
            <p>Ce message a été envoyé via le formulaire de contact de Atreyiu Hub V2.</p>
            <p>&copy; 2026 Atreyiu Hub. Tous droits réservés.</p>
        </div>
    </div>
</body>
</html>
